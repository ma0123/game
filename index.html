<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>水果記憶遊戲</title>

<style>
body{
margin:0;
font-family:"Comic Sans MS",sans-serif;
text-align:center;
background:linear-gradient(#a8e6ff,#ffffff);
overflow-x:hidden;
}

h1{
font-size:42px;
color:#ff6699;
}

#startBtn{
font-size:26px;
padding:15px 40px;
border-radius:20px;
border:none;
background:#ff6699;
color:white;
cursor:pointer;
margin:10px;
}

#timer{
font-size:28px;
color:#333;
margin-top:10px;
}

#gameBoard{
display:grid;
grid-template-columns:repeat(5,120px);
gap:15px;
justify-content:center;
margin-top:20px;
}

.card{
width:120px;
height:120px;
perspective:800px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
position:relative;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
backface-visibility:hidden;
}

.front{
background:#f5f3ed;
}

.back{
background:white;
transform:rotateY(180deg);
}

#hand{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

#hand .card{
transform:scale(.7);
}

#fireworks{
position:fixed;
pointer-events:none;
top:0;
left:0;
width:100%;
height:100%;
}
</style>
</head>

<body>

<h1>🍓 水果記憶遊戲 🍌</h1>
<button id="startBtn">開始遊戲</button>
<div id="timer"></div>
<div id="gameBoard"></div>

<h2>我的水果</h2>
<div id="hand"></div>
<canvas id="fireworks"></canvas>

<audio id="bgm" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8f1c1d5e3.mp3"></audio>
<audio id="flipSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_3c0a33b7e7.mp3"></audio>
<audio id="matchSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_0c9b04c8b8.mp3"></audio>

<script>
const fruits=[
{icon:"🍎",name:"apple"},
{icon:"🍌",name:"banana"},
{icon:"🍇",name:"grape"},
{icon:"🍉",name:"watermelon"},
{icon:"🍓",name:"strawberry"},
{icon:"🍍",name:"pineapple"},
{icon:"🥝",name:"kiwi"},
{icon:"🍑",name:"peach"},
{icon:"🍒",name:"cherry"},
{icon:"🍋",name:"lemon"}
];

let cards=[], first=null, second=null, lock=false, matched=0;
let countdownInterval, gameTimerInterval, elapsedTime=0;

const board=document.getElementById("gameBoard");
const timerDisplay=document.getElementById("timer");

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
speechSynthesis.speak(msg);
}

function createBoard(){
board.innerHTML="";
cards=[...fruits,...fruits];
shuffle(cards);

cards.forEach((fruit,i)=>{
let card=document.createElement("div");
card.className="card";

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="front";
front.innerHTML="？";

let back=document.createElement("div");
back.className="back";
back.innerHTML=fruit.icon;

inner.appendChild(front);
inner.appendChild(back);
card.appendChild(inner);
card.data=fruit;

// 支援滑動觸控
card.onclick = card.ontouchstart = () => flip(card);

board.appendChild(card);
setTimeout(()=>card.classList.add("flip"),40*i);
});

// 10 秒倒數後翻回
let countdown=10;
timerDisplay.textContent=`翻牌時間剩 ${countdown} 秒`;
countdownInterval=setInterval(()=>{
countdown--;
timerDisplay.textContent=`翻牌時間剩 ${countdown} 秒`;
if(countdown<=0){
clearInterval(countdownInterval);
document.querySelectorAll(".card").forEach(c=>c.classList.remove("flip"));
startGameTimer();
}
},1000);
}

function flip(card){
if(lock || card.classList.contains("flip")) return;
document.getElementById("flipSound").play();
card.classList.add("flip");
speak(card.data.name);

if(!first){
first=card;
return;
}
second=card;
lock=true;

if(first.data.icon===second.data.icon){
document.getElementById("matchSound").play();
setTimeout(()=>{
collect(first);
collect(second);
matched++;
reset();
if(matched===10){
stopGameTimer();
fireworks();
alert(`太棒了！全部找到！\n你花了 ${elapsedTime} 秒完成遊戲！`);
document.getElementById("startBtn").style.display="inline-block";
}
},600);
}else{
setTimeout(()=>{
first.classList.remove("flip");
second.classList.remove("flip");
reset();
},1000);
}
}

function collect(card){
let clone=card.cloneNode(true);
clone.classList.add("flip");
document.getElementById("hand").appendChild(clone);
card.style.visibility="hidden";
}

function reset(){[first,second]=[null,null]; lock=false;}

document.getElementById("startBtn").onclick=()=>{
matched=0;
elapsedTime=0;
document.getElementById("hand").innerHTML="";
document.getElementById("startBtn").style.display="none";
createBoard();
document.getElementById("bgm").play();
}

// 遊戲計時器
function startGameTimer(){
elapsedTime=0;
gameTimerInterval=setInterval(()=>{
elapsedTime++;
timerDisplay.textContent=`已用時間: ${elapsedTime} 秒`;
},1000);
}

function stopGameTimer(){
clearInterval(gameTimerInterval);
}

// 煙火特效
function fireworks(){
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<100;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:100
});
}
function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fill();
});
particles=particles.filter(p=>p.life>0);
if(particles.length>0) requestAnimationFrame(animate);
}
animate();
}
</script>

</body>
</html>
